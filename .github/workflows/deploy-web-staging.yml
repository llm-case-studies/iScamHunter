name: Deploy Web Staging

on:
  push:
    branches: [staging]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web-staging.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: llm-case-studies/iscamhunter-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    concurrency:
      group: iscamhunter-web-staging-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          key: ${{ secrets.IONOS_SSH_KEY }}
          script: |
            # Pull new image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

            # Stop and remove old container if exists
            docker stop iscamhunter-web-staging 2>/dev/null || true
            docker rm iscamhunter-web-staging 2>/dev/null || true

            # Start new container on the staging network
            docker run -d \
              --name iscamhunter-web-staging \
              --restart unless-stopped \
              --network proxyuser_staging \
              -e NODE_ENV=production \
              -e PORT=3000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

            # Wait for container to be healthy
            sleep 5
            docker logs iscamhunter-web-staging --tail 10

            # Reload nginx-proxy-staging to pick up the new container
            docker exec nginx-proxy-staging nginx -s reload 2>/dev/null || true
